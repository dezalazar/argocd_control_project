apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dezalazar/argocd_helm_project.git'
    path: charts/hello-world      # La ruta donde está tu Chart.yaml
    targetRevision: main
    helm:
      valueFiles:
        - values-dev.yaml         # El archivo de configuración específico para DEV
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
